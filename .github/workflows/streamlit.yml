name: Streamlit CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔍 Validate Python Syntax
        run: |
          python -m compileall .

      - name: 🧹 Lint with Ruff
        run: |
          pip install ruff
          ruff check .
        continue-on-error: true

      - name: 🎨 Format Check with Black
        run: |
          pip install black
          black --check .
        continue-on-error: true

      - name: 🧪 Smoke Test Imports
        run: |
          python -c "
          import app
          print('✓ app.py imported successfully')
          "

      - name: 🚀 Verify Streamlit Installation
        run: |
          streamlit --version

      - name: 📋 Display Installed Packages
        run: |
          pip list

      - name: ✅ CI Complete
        run: |
          echo 'ML Analytics Studio validation completed successfully.'
