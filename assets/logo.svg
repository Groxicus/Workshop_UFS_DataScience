<?xml version="1.0" encoding="UTF-8"?>
<svg
    xmlns="http://www.w3.org/2000/svg"
    width="512"
    height="512"
    viewBox="0 0 512 512">

    <defs>

        <linearGradient
            id="grad"
            x1="0%"
            y1="0%"
            x2="100%"
            y2="100%">

            <stop offset="0%" stop-color="#2563EB"/>
            <stop offset="100%" stop-color="#14B8A6"/>

        </linearGradient>

        <filter
            id="shadow"
            x="-20%"
            y="-20%"
            width="140%"
            height="140%">

            <feDropShadow
                dx="0"
                dy="8"
                stdDeviation="10"
                flood-opacity="0.20"/>

        </filter>

    </defs>

    <!-- Background -->

    <rect
        width="512"
        height="512"
        rx="96"
        fill="#0F172A"/>

    <!-- Circle -->

    <circle
        cx="256"
        cy="256"
        r="170"
        fill="url(#grad)"
        filter="url(#shadow)"/>

    <!-- Bar Chart -->

    <rect
        x="175"
        y="250"
        width="28"
        height="90"
        rx="6"
        fill="white"/>

    <rect
        x="225"
        y="205"
        width="28"
        height="135"
        rx="6"
        fill="white"/>

    <rect
        x="275"
        y="165"
        width="28"
        height="175"
        rx="6"
        fill="white"/>

    <rect
        x="325"
        y="120"
        width="28"
        height="220"
        rx="6"
        fill="white"/>

    <!-- Trend Line -->

    <polyline
        points="189,250 239,205 289,165 339,120"
        fill="none"
        stroke="#FACC15"
        stroke-width="10"
        stroke-linecap="round"
        stroke-linejoin="round"/>

    <!-- Data Points -->

    <circle
        cx="189"
        cy="250"
        r="8"
        fill="#FACC15"/>

    <circle
        cx="239"
        cy="205"
        r="8"
        fill="#FACC15"/>

    <circle
        cx="289"
        cy="165"
        r="8"
        fill="#FACC15"/>

    <circle
        cx="339"
        cy="120"
        r="8"
        fill="#FACC15"/>

</svg>
